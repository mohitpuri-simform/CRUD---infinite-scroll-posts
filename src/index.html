<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts listing</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <nav>
      <a href="#">Postagram</a>
      <input type="text" placeholder="Search for posts..." id="search" />
    </nav>
    <div class="form-container">
      <form class="create-new-post">
        <p>Create New Post</p>
        <input type="text" placeholder="post title" id="title" required />
        <textarea type="text" id="content" required></textarea>
        <div class="tags">
          <input type="text" placeholder="enter Tag for the post" id="tag1" />
          <input type="text" placeholder="enter Tag for the post" id="tag2" />
        </div>
        <button type="submit" id="create-post-button">Add</button>
      </form>
    </div>
    <div class="posts-container"></div>
  </body>
  <script type="module" src="./scripts/main.ts"></script>
</html>
